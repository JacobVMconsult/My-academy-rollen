<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#1a1a1a;font-size:14px}
.topbar{background:#1F3864;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:700;letter-spacing:.5px}
.logo span{color:#BDD7EE;font-weight:400;font-size:14px;margin-left:8px}
.topbar-right{font-size:12px;color:#BDD7EE}
#refresh-zone{background:#fff;border:2px dashed #2E75B6;border-radius:10px;margin:16px 24px 0;padding:14px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
#refresh-zone.drag-over{background:#E6F1FB;border-color:#1F3864}
#refresh-zone input[type=file]{display:none}
.rz-icon{font-size:26px;flex-shrink:0}
.rz-text{flex:1}
.rz-text strong{display:block;font-size:13px;color:#1F3864}
.rz-text span{font-size:12px;color:#666}
.rz-btn{background:#2E75B6;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.rz-btn:hover{background:#1F3864}
.meta-bar{background:#fff;border-bottom:1px solid #dde3ec;padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#data-date{font-size:12px;color:#888;background:#f4f6f9;padding:4px 10px;border-radius:20px}
.controls{padding:14px 24px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls input,.controls select{font-size:13px;padding:8px 12px;border:1px solid #ccd4e0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.controls input{flex:1;min-width:180px}
.controls input:focus,.controls select:focus{border-color:#2E75B6}
#stats{padding:10px 24px 0;font-size:12px;color:#666}
#results{padding:12px 24px 24px}
.card{background:#fff;border:1px solid #dde3ec;border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#185FA5;flex-shrink:0}
.card-meta{flex:1}
.card-name{font-size:15px;font-weight:700;color:#1F3864}
.card-sub{font-size:11px;color:#888;margin-top:2px}
.vest-badge{font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap;align-self:flex-start;flex-shrink:0;font-weight:600}
.dealers-grid{display:flex;flex-direction:column;gap:8px}
.dealer-block{background:#f8f9fc;border:1px solid #e8edf5;border-radius:8px;padding:10px 12px}
.dealer-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mat-num{font-size:12px;font-weight:700;color:#1F3864;background:#E6F1FB;border-radius:5px;padding:2px 8px;font-family:monospace}
.merk-lbl{font-size:12px;color:#555;font-weight:600}
.roles-list{display:flex;flex-wrap:wrap;gap:5px}
.role-pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap}
.hf{background:#EAF3DE;color:#2E6B0F;border-color:#b8d98a;font-weight:700}
.df{background:#E6F1FB;color:#185FA5;border-color:#9dc8f0}
.no-roles{font-size:12px;color:#aaa;font-style:italic;padding:4px 0}
.no-results{text-align:center;padding:4rem 1rem;color:#aaa;font-size:14px}
.legend{display:flex;gap:16px;align-items:center;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(31,56,100,.7);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#fff;font-size:16px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#1F3864;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;z-index:1000;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

// ── Parse Excel ───────────────────────────────────────────────────────────
function parseExcel(ab) {
  const wb = XLSX.read(ab, {type:'arraybuffer'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  
  // Find header row
  let hdrIdx = -1;
  for (let i = 0; i < raw.length; i++) {
    if (raw[i].join(' ').includes('Gebruiker - Gebruikers-ID')) { hdrIdx = i; break; }
  }
  if (hdrIdx < 0) throw new Error('Kolomheaders niet gevonden. Controleer of dit het juiste rapport is.');
  
  const headers = raw[hdrIdx];
  const users = [];
  
  for (let i = hdrIdx + 1; i < raw.length; i++) {
    const row = raw[i];
    if (!row[0]) continue;
    const get = (name) => { const idx = headers.indexOf(name); return idx >= 0 ? String(row[idx] || '').trim() : ''; };
    
    const rawVest = get('Gebruiker - Divisie');
    const vestiging = DIVISIE_MAP[rawVest] || rawVest;
    
    const byDealer = {};
    for (let r = 1; r <= 25; r++) {
      const merkCol = r === 2 ? 'Gebruiker - Rol 2' : `Gebruiker - Rol ${r} Merk`;
      const titelCol = `Gebruiker - Rol ${r} Titel`;
      const hfCol = `Gebruiker - Rol ${r} Hoofdfunctie`;
      const matCol = `Gebruiker - Rol ${r} Matricule`;
      if (!headers.includes(titelCol)) continue;
      const titel = get(titelCol);
      if (!titel || titel === '-') continue;
      const merk = headers.includes(merkCol) ? get(merkCol) : '';
      const hf   = headers.includes(hfCol)   ? get(hfCol)   : '';
      const mat  = headers.includes(matCol)   ? get(matCol)  : 'Onbekend';
      const key  = mat || 'Onbekend';
      if (!byDealer[key]) byDealer[key] = {matricule: key, merk, roles: []};
      byDealer[key].roles.push({titel, type: hf, merk});
    }
    
    users.push({
      id:       get('Gebruiker - Gebruikers-ID'),
      naam:     `${get('Gebruiker - Achternaam gebruiker')}, ${get('Gebruiker - Voornaam gebruiker')}`,
      manager:  get('Manager'),
      vestiging,
      dealers:  Object.values(byDealer)
    });
  }
  users.sort((a, b) => a.vestiging.localeCompare(b.vestiging) || a.naam.localeCompare(b.naam));
  return users;
}

// ── Load data ─────────────────────────────────────────────────────────────
function loadUsers(users, label) {
  USERS = users;
  dataLabel = label;
  document.getElementById('data-date').textContent = label;
  document.getElementById('topbar-count').textContent = `${users.length} gebruikers`;
  rebuildFilters();
  render();
  showToast(`✅ ${users.length} gebruikers geladen`);
}

function rebuildFilters() {
  const vs = document.getElementById('vest-filter');
  const ms = document.getElementById('merk-filter');
  vs.innerHTML = '<option value="">Alle vestigingen</option>';
  ms.innerHTML = '<option value="">Alle merken</option>';
  [...new Set(USERS.map(u => u.vestiging))].sort().forEach(v => {
    const o = document.createElement('option'); o.value = v; o.text = v; vs.appendChild(o);
  });
  [...new Set(USERS.flatMap(u => u.dealers.flatMap(d => d.roles.map(r => r.merk))))].filter(Boolean).sort().forEach(m => {
    const o = document.createElement('option'); o.value = m; o.text = m; ms.appendChild(o);
  });
}

// ── File handling ─────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file || (!file.name.endsWith('.xlsx') && !file.name.endsWith('.xls'))) {
    showToast('⚠️ Selecteer een .xlsx bestand'); return;
  }
  showLoading('Excel verwerken...');
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const users = parseExcel(e.target.result);
      if (!users.length) throw new Error('Geen gebruikers gevonden in dit bestand.');
      const d = new Date(); const fmt = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
      loadUsers(users, `Bijgewerkt uit: ${file.name} (${fmt})`);
    } catch(err) {
      showToast('❌ Fout: ' + err.message);
    } finally { hideLoading(); }
  };
  reader.readAsArrayBuffer(file);
}

const rz = document.getElementById('refresh-zone');
rz.addEventListener('dragover', e => { e.preventDefault(); rz.classList.add('drag-over'); });
rz.addEventListener('dragleave', () => rz.classList.remove('drag-over'));
rz.addEventListener('drop', e => {
  e.preventDefault(); rz.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

// ── UI helpers ────────────────────────────────────────────────────────────
function showLoading(msg) { document.getElementById('loading-msg').textContent = msg; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Render ────────────────────────────────────────────────────────────────
function initials(naam) {
  const p = naam.split(',').map(s => s.trim());
  return ((p[1]||'')[0]||'') + ((p[0]||'')[0]||'');
}

function renderCard(u, merkFilter) {
  const vc = VEST_COLORS[u.vestiging] || {bg:'#eeecea',txt:'#555'};
  const ini = initials(u.naam).toUpperCase() || '?';
  let dealerHtml = '';

  // When a merk filter is active, only show dealer blocks that have roles for that merk
  const dealers = merkFilter
    ? u.dealers.filter(d => d.roles.some(r => r.merk === merkFilter))
    : u.dealers;

  if (!dealers.length) {
    dealerHtml = '<div class="no-roles">Geen roltoewijzingen gevonden</div>';
  } else {
    dealerHtml = dealers.map(d => {
      // When merk filter active, only show roles for that merk within the dealer block
      const rolesToShow = merkFilter
        ? d.roles.filter(r => r.merk === merkFilter && r.titel && r.titel !== '-')
        : d.roles.filter(r => r.titel && r.titel !== '-');
      const roles = rolesToShow.map(r => {
        const cls = r.type === 'Hoofdfunctie' ? 'hf' : 'df';
        const mrkLbl = r.merk ? `<span style="opacity:.7;font-weight:400">${r.merk} — </span>` : '';
        return `<span class="role-pill ${cls}" title="${r.type||''}">${mrkLbl}${r.titel}</span>`;
      }).join('');
      return `<div class="dealer-block">
        <div class="dealer-header">
          <span class="mat-num">${d.matricule}</span>
          <span class="merk-lbl">${d.merk}</span>
        </div>
        <div class="roles-list">${roles || '<span style="font-size:11px;color:#aaa">—</span>'}</div>
      </div>`;
    }).join('');
  }
  return `<div class="card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <div class="avatar">${ini}</div>
        <div class="card-meta">
          <div class="card-name">${u.naam}</div>
          <div class="card-sub">${u.id}${u.manager ? '  ·  Manager: ' + u.manager : ''}</div>
        </div>
      </div>
      <span class="vest-badge" style="background:${vc.bg};color:${vc.txt}">${u.vestiging}</span>
    </div>
    <div class="dealers-grid">${dealerHtml}</div>
  </div>`;
}

function filter() {
  const q = document.getElementById('srch').value.toLowerCase().trim();
  const v = document.getElementById('vest-filter').value;
  const m = document.getElementById('merk-filter').value;
  return USERS.filter(u => {
    if (v && u.vestiging !== v) return false;
    if (m && !u.dealers.some(d => d.roles.some(r => r.merk === m))) return false;
    if (!q) return true;
    const hay = [u.naam, u.id, u.manager, u.vestiging,
      ...u.dealers.map(d => [d.matricule, d.merk, ...d.roles.map(r => r.titel + ' ' + r.merk)].join(' '))
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function render() {
  const res = filter();
  const m = document.getElementById('merk-filter').value;
  const el = document.getElementById('results');
  const st = document.getElementById('stats');
  if (!res.length) {
    el.innerHTML = '<div class="no-results">Geen gebruikers gevonden voor deze zoekopdracht.</div>';
    st.textContent = ''; return;
  }
  st.textContent = `${res.length} gebruiker${res.length !== 1 ? 's' : ''} gevonden`;
  el.innerHTML = res.map(u => renderCard(u, m)).join('');
}

document.getElementById('srch').addEventListener('input', render);
document.getElementById('vest-filter').addEventListener('change', render);
document.getElementById('merk-filter').addEventListener('change', render);

// ── Init with built-in data ───────────────────────────────────────────────
loadUsers(BUILTIN, 'Ingebouwde data: 27-03-2026 (sleep nieuw rapport om te updaten)');
</script>
